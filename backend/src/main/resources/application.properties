# Spring Boot configuration
spring.application.name=docai

# Database configuration
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:docai}
spring.datasource.username=${DATABASE_USER:dev}
spring.datasource.password=${DATABASE_PASSWORD:dev}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# File upload properties
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Local file storage (dev mode path)
app.upload.dir=${UPLOAD_DIR:./uploads}

# OpenAI configuration
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

# JWT configuration
# Must be set via environment variable — no hardcoded fallback (RULES.md §2)
app.jwt.secret=${JWT_SECRET}
# 24 Hours in milliseconds
app.jwt.expiration=86400000

# Cloudflare R2 configurations
app.r2.enabled=${R2_ENABLED:false}
app.r2.account-id=${R2_ACCOUNT_ID:}
app.r2.access-key-id=${R2_ACCESS_KEY_ID:}
app.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
app.r2.bucket-name=${R2_BUCKET_NAME:docai-files}
